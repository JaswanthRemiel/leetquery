<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leetQuery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #e8e6e1;
      --border-strong: #d0cdc6;
      --text: #1c1917;
      --text-muted: #78716c;
      --text-faint: #a8a29e;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --success: #16a34a;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    html.dark {
      --bg: #111110;
      --surface: #1c1b1a;
      --border: #2a2826;
      --border-strong: #3a3734;
      --text: #e7e5e4;
      --text-muted: #a8a29e;
      --text-faint: #57534e;
      --accent: #60a5fa;
      --accent-bg: #1e3a5f;
      --success: #4ade80;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo span {
      color: var(--accent);
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .theme-btn:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--bg);
    }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left pane ── */
    .pane-left {
      width: 340px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-section {
      padding: 20px 20px 0;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    /* Username input */
    .username-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .username-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
    }

    input[type='text'] {
      width: 100%;
      padding: 7px 10px 7px 32px;
      font-size: 13px;
      font-family: var(--mono);
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s;
      outline: none;
    }

    input[type='text']:focus {
      border-color: var(--accent);
    }

    input[type='text']::placeholder {
      color: var(--text-faint);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 20px;
    }

    /* Fields */
    .fields-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 10px;
    }

    .field-count {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-faint);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 8px;
    }

    .fields-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 16px;
    }

    .fields-scroll::-webkit-scrollbar { width: 4px; }
    .fields-scroll::-webkit-scrollbar-track { background: transparent; }
    .fields-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .field-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
      margin-bottom: 1px;
    }

    .field-item:hover { background: var(--border); }

    .field-item input[type='checkbox'] {
      width: 14px;
      height: 14px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .field-text { flex: 1; min-width: 0; }

    .field-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: block;
      margin-bottom: 1px;
    }

    .field-desc {
      font-size: 11px;
      color: var(--text-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Right pane ── */
    .pane-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 20px;
      gap: 12px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .code-wrap {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: auto;
      position: relative;
    }

    .code-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    .code-wrap::-webkit-scrollbar-track { background: transparent; }
    .code-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    pre {
      padding: 16px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* JSON syntax highlighting */
    .key   { color: var(--text-muted); }
    .str   { color: var(--accent); }
    .num   { color: var(--success); }

    /* Buttons */
    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--sans);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .btn:hover {
      background: var(--bg);
      border-color: var(--border-strong);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.88;
    }

    .sel-btn {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 1px 0;
      transition: color 0.12s;
    }
    .sel-btn:hover { color: var(--accent); }

    .btn-success {
      color: var(--success);
      border-color: var(--success);
    }

    /* Responsive */
    @media (max-width: 680px) {
      .main { flex-direction: column; }
      .pane-left { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
      .fields-scroll { max-height: 200px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">leet<span>Query</span></div>
    <button class="theme-btn" id="themeBtn" title="Toggle theme">
      <svg id="iconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <div class="main">

    <!-- Left -->
    <div class="pane-left">
      <div class="pane-section">
        <div class="section-label">Username</div>
        <div class="username-wrap">
          <svg class="username-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" placeholder="leetcode username" value="jrxag_official">
        </div>
      </div>

      <div class="divider"></div>

      <div class="fields-header">
        <span class="section-label" style="margin:0">Fields</span>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="sel-btn" id="selectAll">all</button>
          <span style="color:var(--border-strong);font-size:11px">·</span>
          <button class="sel-btn" id="selectNone">none</button>
          <span class="field-count" id="fieldCount">11</span>
        </div>
      </div>

      <div class="fields-scroll">
        <div id="fieldsList"></div>
      </div>
    </div>

    <!-- Right -->
    <div class="pane-right">
      <div class="output-header">
        <span class="section-label" style="margin:0">Payload</span>
      </div>

      <div class="code-wrap">
        <pre id="payload">{}</pre>
      </div>

      <div class="actions">
        <button class="btn" id="copyBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="btn btn-primary" id="openBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open API
        </button>
      </div>
    </div>

  </div>

  <script>
    const FIELDS = [
      { id: 'allQuestionsCount', label: 'All questions count', description: 'Total easy / medium / hard on LeetCode' },
      { id: 'totalSolved',       label: 'Total solved',        description: 'Accepted submissions count' },
      { id: 'easySolved',        label: 'Easy solved',         description: 'AC count for easy problems' },
      { id: 'mediumSolved',      label: 'Medium solved',       description: 'AC count for medium problems' },
      { id: 'hardSolved',        label: 'Hard solved',         description: 'AC count for hard problems' },
      { id: 'submitStats',       label: 'Submit stats',        description: 'Full AC + total submission breakdown' },
      { id: 'ranking',           label: 'Ranking',             description: 'Global rank via submitStatsGlobal' },
      { id: 'profile',           label: 'Profile info',        description: 'Reputation and ranking' },
      { id: 'contributions',     label: 'Contributions',       description: 'Contribution points' },
      { id: 'submissionCalendar',label: 'Submission calendar', description: 'Daily activity heatmap data' },
      { id: 'recentSubmissions', label: 'Recent submissions',  description: 'Last 20 with status and language' },
    ];

    const SUBMIT_STATS_IDS = ['totalSolved', 'easySolved', 'mediumSolved', 'hardSolved', 'submitStats'];

    function buildQuery(selected) {
      const parts = [];
      let needsUsername = false;
      
      // Top-level field (doesn't need username)
      if (selected.includes('allQuestionsCount')) {
        parts.push('allQuestionsCount { difficulty count }');
      }
      
      // Fields that go into matchedUser
      const matchedUserFields = [];
      if (selected.includes('contributions'))      matchedUserFields.push('contributions { points }');
      if (selected.includes('profile'))            matchedUserFields.push('profile { reputation ranking }');
      if (selected.includes('submissionCalendar')) matchedUserFields.push('submissionCalendar');
      
      // Submit stats from any of these fields
      if (selected.some(f => SUBMIT_STATS_IDS.includes(f))) {
        matchedUserFields.push('submitStats { acSubmissionNum { difficulty count submissions } totalSubmissionNum { difficulty count submissions } }');
      }
      
      // Build matchedUser call if we have fields for it
      if (matchedUserFields.length > 0) {
        parts.push(`matchedUser(username: $username) { ${matchedUserFields.join(' ')} }`);
        needsUsername = true;
      }
      
      // Recent submissions
      if (selected.includes('recentSubmissions')) {
        parts.push('recentSubmissionList(username: $username) { title titleSlug timestamp statusDisplay lang }');
        needsUsername = true;
      }
      
      // Ranking (uses submitStatsGlobal, aliased to avoid conflicts)
      if (selected.includes('ranking')) {
        parts.push('matchedUserStats: matchedUser(username: $username) { submitStats: submitStatsGlobal { acSubmissionNum { difficulty count submissions __typename } totalSubmissionNum { difficulty count submissions __typename } __typename } }');
        needsUsername = true;
      }
      
      // Fallback: if no fields selected, return a valid default query
      if (parts.length === 0) {
        return 'query getUserProfile { allQuestionsCount { difficulty count } }';
      }
      
      // Build final query with conditional variable declaration
      const varDef = needsUsername ? '($username: String!)' : '';
      return `query getUserProfile${varDef} { ${parts.join(' ')} }`;
    }

    function buildPayload(selected, username) {
      // Check if username is needed
      const needsUsername = 
        selected.some(f => SUBMIT_STATS_IDS.includes(f)) ||
        selected.includes('contributions') ||
        selected.includes('profile') ||
        selected.includes('submissionCalendar') ||
        selected.includes('recentSubmissions') ||
        selected.includes('ranking');
      
      return {
        query: buildQuery(selected),
        variables: needsUsername ? { username } : {}
      };
    }

    // State
    let selected = new Set(FIELDS.map(f => f.id));
    const usernameInput = document.getElementById('username');
    const fieldsList    = document.getElementById('fieldsList');
    const fieldCount    = document.getElementById('fieldCount');
    const payloadPre    = document.getElementById('payload');
    const copyBtn       = document.getElementById('copyBtn');
    const openBtn       = document.getElementById('openBtn');
    const themeBtn      = document.getElementById('themeBtn');
    const iconSun       = document.getElementById('iconSun');
    const iconMoon      = document.getElementById('iconMoon');

    function syntaxHighlight(json) {
      return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
          if (/^"/.test(match)) {
            if (/:$/.test(match)) return `<span class="key">${match}</span>`;
            return `<span class="str">${match}</span>`;
          }
          return `<span class="num">${match}</span>`;
        });
    }

    function renderFields() {
      fieldsList.innerHTML = FIELDS.map(f => `
        <label class="field-item">
          <input type="checkbox" data-field="${f.id}" ${selected.has(f.id) ? 'checked' : ''}>
          <div class="field-text">
            <span class="field-name">${f.label}</span>
            <span class="field-desc">${f.description}</span>
          </div>
        </label>`).join('');

      document.querySelectorAll('input[data-field]').forEach(cb => {
        cb.addEventListener('change', e => {
          e.target.checked ? selected.add(e.target.dataset.field) : selected.delete(e.target.dataset.field);
          updatePayload();
        });
      });
    }

    function updatePayload() {
      const payload = buildPayload(Array.from(selected), usernameInput.value);
      const json = JSON.stringify(payload, null, 2);
      payloadPre.innerHTML = syntaxHighlight(json);
      fieldCount.textContent = selected.size;
    }

    copyBtn.addEventListener('click', async () => {
      const payload = buildPayload(Array.from(selected), usernameInput.value);
      try {
        await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
        copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
        copyBtn.classList.add('btn-success');
        setTimeout(() => {
          copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
          copyBtn.classList.remove('btn-success');
        }, 1800);
      } catch (e) { console.error(e); }
    });

    openBtn.addEventListener('click', () => {
      const p = buildPayload(Array.from(selected), usernameInput.value);
      window.open(`https://leetcode.com/graphql?query=${encodeURIComponent(p.query)}&variables=${encodeURIComponent(JSON.stringify(p.variables))}`, '_blank');
    });

    usernameInput.addEventListener('input', updatePayload);

    document.getElementById('selectAll').addEventListener('click', () => {
      selected = new Set(FIELDS.map(f => f.id));
      renderFields(); updatePayload();
    });

    document.getElementById('selectNone').addEventListener('click', () => {
      selected = new Set();
      renderFields(); updatePayload();
    });

    // Theme
    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      iconSun.style.display  = dark ? 'none' : '';
      iconMoon.style.display = dark ? '' : 'none';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    themeBtn.addEventListener('click', () => applyTheme(!document.documentElement.classList.contains('dark')));

    const saved = localStorage.getItem('theme');
    applyTheme(saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);

    renderFields();
    updatePayload();
  </script>
</body>
</html>
